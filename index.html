<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitaplığın</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* UI Canvas Standardization Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Top Header Area Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px 16px 12px 16px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #282828;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .add-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Main Workspace Panels Scroll Track */
        .content {
            padding: 8px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            position: relative;
        }

        /* Trigger Block: Local File Import Panel */
        .import-card {
            width: 100%;
            background-color: #1e1e1e;
            border: none;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        .import-card:active {
            background-color: #242424;
        }

        .import-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .import-icon {
            font-size: 20px;
            color: #ffffff;
            opacity: 0.9;
        }

        .import-text {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            text-align: left;
            color: #ffffff;
            max-width: 250px;
        }

        .arrow-icon {
            color: #ffffff;
            opacity: 0.9;
            font-size: 14px;
        }

        /* NEW: 3D Cover Flow Display Engine Library Viewport */
        .library-3d-viewport {
            width: 100%;
            height: 260px;
            background-color: #0b0b0b;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            perspective: 900px; /* High field depth to enforce crisp diagonal rotation angles */
            border: 2px dashed rgba(255, 255, 255, 0.05);
            transition: border-color 0.3s, background-color 0.3s;
        }

        /* Drag over visual notification frame highlight */
        .library-3d-viewport.drag-over {
            border-color: #1db954;
            background-color: rgba(29, 185, 84, 0.04);
        }

        .coverflow-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .coverflow-container:active {
            cursor: grabbing;
        }

        /* Dynamic Album Card Structures */
        .album-spine-card {
            position: absolute;
            width: 140px;
            height: 190px;
            background-color: #222;
            border-radius: 6px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: transform 0.45s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.45s;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .album-spine-art {
            width: 100%;
            height: 135px;
            background: linear-gradient(45deg, #333, #111);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album-spine-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-spine-art i {
            font-size: 38px;
            color: rgba(255, 255, 255, 0.2);
        }

        .album-spine-details {
            padding: 8px;
            background-color: #181818;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .album-spine-title {
            font-size: 11px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
            text-align: center;
        }

        .album-spine-artist {
            font-size: 9px;
            font-weight: 500;
            color: #a7a7a7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        /* Helpful visual backdrop call-to-action text when library workspace runs clear */
        .viewport-empty-notice {
            position: absolute;
            font-size: 13px;
            font-weight: 600;
            color: #6a6a6a;
            text-align: center;
            pointer-events: none;
            padding: 0 32px;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .viewport-empty-notice i {
            font-size: 28px;
            color: #444;
        }

        /* Guide Helper Onboarding Box */
        .tips-card {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-shrink: 0;
        }

        .tips-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .tips-label {
            font-size: 11px;
            font-weight: 600;
            color: #a7a7a7;
        }

        .close-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
        }

        .tips-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.1px;
        }

        .tips-subtitle {
            font-size: 13px;
            color: #b3b3b3;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .action-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* Fixed Placement Control Tray Deck */
        .bottom-section {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #121212;
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Custom Burgundy Mini Player Deck */
        .mini-player {
            background-color: #51071e; 
            margin: 0 8px 16px 8px;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .player-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .album-art {
            width: 38px;
            height: 38px;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            background-color: #282828;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-art i {
            color: #b3b3b3;
            font-size: 16px;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .song-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 12px;
            color: #b3b3b3;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .local-badge {
            color: #1db954;
            font-size: 11px;
            display: flex;
            align-items: center;
        }

        .player-right {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-right: 8px;
        }

        .device-btn, .play-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            font-size: 16px;
            width: 20px;
        }

        /* Mini Media Audio Timeline Track Components */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 8px;
            right: 8px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.12);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #ffffff;
            transition: width 0.1s linear;
        }

        /* Bottom Tab Selector Grid */
        .bottom-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .nav-item {
            background: none;
            border: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .nav-icon {
            font-size: 20px;
            color: #ffffff;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
            color: #ffffff;
        }

        #hiddenFileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <audio id="audioEngine"></audio>
        <input type="file" id="hiddenFileInput" accept="audio/mp3, audio/*" multiple>

        <header class="header">
            <div class="header-left">
                <div class="profile-avatar">
                    <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?q=80&w=100&auto=format&fit=crop" alt="Profile">
                </div>
                <h1>Kitaplığın</h1>
            </div>
            <button class="add-btn" id="addBtnPlus"><i class="fa-solid fa-plus"></i></button>
        </header>

        <main class="content">
            <button class="import-card" id="importBtn">
                <div class="import-left">
                    <i class="fa-solid fa-arrow-down import-icon"></i>
                    <span class="import-text">Diğer uygulamalardaki müziklerini içe aktar</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </button>

            <div class="library-3d-viewport" id="dropZoneViewport">
                <div class="viewport-empty-notice" id="emptyNotice">
                    <i class="fa-solid fa-compact-disc fa-spin" style="animation-duration: 4s;"></i>
                    <span>Müzik dosyalarını buraya sürükleyip bırakın veya yukarıdaki butona basarak kitaplığa ekleyin</span>
                </div>
                <div class="coverflow-container" id="coverflowContainer">
                    </div>
            </div>

            <div class="tips-card" id="tipsCard">
                <div class="tips-header">
                    <span class="tips-label">İpuçları</span>
                    <button class="close-btn" id="closeTips"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <h2 class="tips-title">İlk çalma listeni oluştur</h2>
                <p class="tips-subtitle">Çok kolay. Sana yardımcı olacağız</p>
                <button class="action-btn" id="createPlaylistBtn">Çalma listesi oluştur</button>
            </div>
        </main>

        <div class="bottom-section">
            <div class="mini-player">
                <div class="player-left">
                    <div class="album-art" id="playerAlbumArtContainer">
                        <i class="fa-solid fa-music" id="fallbackMusicIcon"></i>
                        <img id="playerAlbumArt" src="" alt="Album Cover" style="display: none;">
                    </div>
                    <div class="song-info">
                        <div class="song-title" id="playerTitle">Carita de Angel</div>
                        <div class="song-artist">
                            <span class="local-badge"><i class="fa-solid fa-square-arrow-up-right"></i></span>
                            <span id="playerArtist">Maria Daniela Y Su Sonido Lasser</span>
                        </div>
                    </div>
                </div>
                <div class="player-right">
                    <button class="device-btn"><i class="fa-solid fa-mobile-screen-button"></i></button>
                    <button class="play-btn" id="playBtn"><i class="fa-solid fa-play"></i></button>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <button class="nav-item">
                    <i class="fa-solid fa-lines-leaning nav-icon"></i>
                    <span>Kitaplığın</span>
                </button>
            </nav>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Core Audio and Data Collection state vectors
            let songsLibrary = [];
            let currentSelectedIndex = 0;
            
            // Drag tracking global control structures
            let isDragging = false;
            let startX = 0;
            let currentScrollX = 0;
            let targetVelocityX = 0;

            // DOM Hooks references mapping
            const closeTips = document.getElementById('closeTips');
            const tipsCard = document.getElementById('tipsCard');
            const playBtn = document.getElementById('playBtn');
            const importBtn = document.getElementById('importBtn');
            const addBtnPlus = document.getElementById('addBtnPlus');
            const fileInput = document.getElementById('hiddenFileInput');
            const audioEngine = document.getElementById('audioEngine');
            const dropZoneViewport = document.getElementById('dropZoneViewport');
            const coverflowContainer = document.getElementById('coverflowContainer');
            const emptyNotice = document.getElementById('emptyNotice');
            
            const playerTitle = document.getElementById('playerTitle');
            const playerArtist = document.getElementById('playerArtist');
            const progressFill = document.getElementById('progressFill');
            const playerAlbumArt = document.getElementById('playerAlbumArt');
            const fallbackMusicIcon = document.getElementById('fallbackMusicIcon');

            // Quick closure triggers
            if (closeTips && tipsCard) {
                closeTips.addEventListener('click', () => tipsCard.style.display = 'none');
            }

            // Beautiful placeholder track generation presets to simulate random custom album designs 
            const geometricArtPalettes = [
                'linear-gradient(135deg, #f5576c 0%, #f093fb 100%)',
                'linear-gradient(135deg, #5ee7df 0%, #b490ca 100%)',
                'linear-gradient(135deg, #c3cfe2 0%, #c3cfe2 100%)',
                'linear-gradient(135deg, #f6d365 0%, #fda085 100%)',
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #13547a 0%, #80d0c7 100%)'
            ];

            // Core 3D Layer math calculation processor loop engine
            function updateCoverflowPositioning() {
                if (songsLibrary.length === 0) {
                    emptyNotice.style.display = 'flex';
                    return;
                }
                emptyNotice.style.display = 'none';

                const viewportWidth = dropZoneViewport.offsetWidth;
                const centerPoint = viewportWidth / 2;

                // Loop layout mapping positions matching exactly your cover design flow
                const blocks = coverflowContainer.querySelectorAll('.album-spine-card');
                blocks.forEach((card, idx) => {
                    const offsetIndex = idx - currentSelectedIndex;
                    
                    let translateX = offsetIndex * 55; // Crisp overlay layout step values
                    let rotateY = 0;
                    let translateZ = 0;
                    let zIndex = 100 - Math.abs(offsetIndex);
                    let opacity = 1;

                    if (offsetIndex < 0) {
                        // Left skewed items turn inward diagonally
                        rotateY = 55; 
                        translateX -= 35;
                        translateZ = -120;
                    } else if (offsetIndex > 0) {
                        // Right skewed items turn outward diagonally
                        rotateY = -55;
                        translateX += 35;
                        translateZ = -120;
                    } else {
                        // Center main active element expands outward forward safely
                        rotateY = 0;
                        translateZ = 80;
                        zIndex = 200;
                    }

                    // Hide extreme clipping items if library list expands broad
                    if (Math.abs(offsetIndex) > 3) {
                        opacity = 0.2;
                    }

                    card.style.transform = `translateX(${translateX}px) rotateY(${rotateY}deg) translateZ(${translateZ}px)`;
                    card.style.zIndex = zIndex;
                    card.style.opacity = opacity;
                });
            }

            // High-precision tracking focus transition processing loops
            function selectTrackFocusIndex(targetIdx) {
                if (songsLibrary.length === 0) return;
                
                // Enforce strict index bounds limitations safely
                currentSelectedIndex = Math.max(0, Math.min(targetIdx, songsLibrary.length - 1));
                updateCoverflowPositioning();

                // Live synchronization of target context structures into background audio drivers
                const currentTrack = songsLibrary[currentSelectedIndex];
                playerTitle.textContent = currentTrack.title;
                playerArtist.textContent = currentTrack.artist;
                
                // Mirror custom dynamic background art tokens back to control deck tray
                fallbackMusicIcon.style.display = 'none';
                playerAlbumArt.style.display = 'block';
                playerAlbumArt.parentNode.style.background = currentTrack.bgGradient;

                // Load audio source pipeline stream cleanly
                audioEngine.src = currentTrack.srcURL;
                audioEngine.play().catch(() => {
                    // Handled gracefully if browser sandboxing defers direct automation actions
                });
            }

            // Universal data parser map loops to format input files reliably
            function pushFilesToLibraryCollection(incomingFiles) {
                let initialLoadFlag = (songsLibrary.length === 0);

                for (let i = 0; i < incomingFiles.length; i++) {
                    const activeFile = incomingFiles[i];
                    if (!activeFile.type.startsWith('audio/')) continue;

                    let baseCleanName = activeFile.name.replace(/\.[^/.]+$/, "");
                    let trackTitle = baseCleanName;
                    let trackArtist = "Yerel Kitaplık (Local Track)";

                    if (baseCleanName.includes(" - ")) {
                        const fragments = baseCleanName.split(" - ");
                        trackArtist = fragments[0].trim();
                        trackTitle = fragments[1].trim();
                    }

                    const randomizedBackgroundArt = geometricArtPalettes[songsLibrary.length % geometricArtPalettes.length];
                    const trackingDataNode = {
                        title: trackTitle,
                        artist: trackArtist,
                        srcURL: URL.createObjectURL(activeFile),
                        bgGradient: randomizedBackgroundArt
                    };

                    songsLibrary.push(trackingDataNode);

                    // Build and append corresponding DOM node block structures instantly 
                    const cardMarkup = document.createElement('div');
                    cardMarkup.className = 'album-spine-card';
                    cardMarkup.innerHTML = `
                        <div class="album-spine-art" style="background: ${randomizedBackgroundArt}">
                            <i class="fa-solid fa-compact-disc"></i>
                        </div>
                        <div class="album-spine-details">
                            <div class="album-spine-title">${trackTitle}</div>
                            <div class="album-spine-artist">${trackArtist}</div>
                        </div>
                    `;

                    // Single item targeting click loops mapped directly onto carousel spines
                    const lockedIndex = songsLibrary.length - 1;
                    cardMarkup.addEventListener('click', () => {
                        if (currentSelectedIndex !== lockedIndex) {
                            selectTrackFocusIndex(lockedIndex);
                        }
                    });

                    coverflowContainer.appendChild(cardMarkup);
                }

                if (initialLoadFlag && songsLibrary.length > 0) {
                    selectTrackFocusIndex(0);
                } else {
                    updateCoverflowPositioning();
                }
            }

            // Touch Gesture Interaction Mapping loops for mobile swipe tracking
            dropZoneViewport.addEventListener('touchstart', (e) => {
                isDragging = true;
                startX = e.touches[0].clientX;
                currentScrollX = startX;
            }, { passive: true });

            dropZoneViewport.addEventListener('touchmove', (e) => {
                if (!isDragging || songsLibrary.length === 0) return;
                const trackingX = e.touches[0].clientX;
                const offsetDelta = trackingX - currentScrollX;
                
                // Swipe sensitivity threshold triggers
                if (Math.abs(offsetDelta) > 45) {
                    if (offsetDelta > 0 && currentSelectedIndex > 0) {
                        selectTrackFocusIndex(currentSelectedIndex - 1);
                        isDragging = false; // Debounce swipe iterations smoothly
                    } else if (offsetDelta < 0 && currentSelectedIndex < songsLibrary.length - 1) {
                        selectTrackFocusIndex(currentSelectedIndex + 1);
                        isDragging = false;
                    }
                    currentScrollX = trackingX;
                }
            }, { passive: true });

            window.addEventListener('touchend', () => isDragging = false);

            // Drag and Drop OS systems hook integration handlers
            ['dragenter', 'dragover'].forEach(eventName => {
                dropZoneViewport.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZoneViewport.classList.add('drag-over');
                }, false);
            });

            ['dragleave', 'drop'].forEach(eventName => {
                dropZoneViewport.addEventListener(eventName, (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    dropZoneViewport.classList.remove('drag-over');
                }, false);
            });

            dropZoneViewport.addEventListener('drop', (e) => {
                const nativeDataTransfer = e.dataTransfer;
                if (nativeDataTransfer && nativeDataTransfer.files.length > 0) {
                    pushFilesToLibraryCollection(nativeDataTransfer.files);
                }
            }, false);

            // Standard System Triggers Interface Actions map wiring
            if (importBtn) importBtn.addEventListener('click', () => fileInput.click());
            if (addBtnPlus) addBtnPlus.addEventListener('click', () => fileInput.click());
            
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        pushFilesToLibraryCollection(e.target.files);
                    }
                });
            }

            // Audio Core Media Player Play/Pause interface tracking runtime logic
            if (playBtn && audioEngine) {
                playBtn.addEventListener('click', () => {
                    if (songsLibrary.length === 0) {
                        fileInput.click();
                        return;
                    }
                    if (audioEngine.paused) {
                        audioEngine.play();
                    } else {
                        audioEngine.pause();
                    }
                });

                audioEngine.addEventListener('play', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                });

                audioEngine.addEventListener('pause', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                });

                audioEngine.addEventListener('timeupdate', () => {
                    if (audioEngine.duration) {
                        const score = (audioEngine.currentTime / audioEngine.duration) * 100;
                        progressFill.style.width = `${score}%`;
                    }
                });

                // Advance forward directly when song loop cycle completes sequence lifecycle
                audioEngine.addEventListener('ended', () => {
                    if (currentSelectedIndex < songsLibrary.length - 1) {
                        selectTrackFocusIndex(currentSelectedIndex + 1);
                    } else {
                        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                        progressFill.style.width = '0%';
                    }
                });
            }

            // Calculate responsive bounds layout adjustments on load configurations automatically
            window.addEventListener('resize', updateCoverflowPositioning);
        });
    </script>
</body>
</html>
