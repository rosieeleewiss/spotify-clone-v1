<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Music Player</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-left">
                <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Profile" class="profile-pic">
                <h1>Kitaplığın</h1>
            </div>
            <button class="icon-btn add-btn"><i class="fa-solid fa-plus"></i></button>
        </header>

        <main class="content">
            <button class="import-card" id="importBtn">
                <div class="import-icon">
                    <i class="fa-solid fa-arrow-down-to-bracket"></i>
                </div>
                <span class="import-text">Diğer uygulamalardaki müziklerini<br>içe aktar</span>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </button>

            <div class="tips-card" id="tipsCard">
                <div class="tips-header">
                    <span class="tips-label">İpuçları</span>
                    <button class="icon-btn close-btn" id="closeTips"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <h2 class="tips-title">İlk çalma listeni oluştur</h2>
                <p class="tips-subtitle">Çok kolay. Sana yardımcı olacağız</p>
                <button class="action-btn">Çalma listesi oluştur</button>
            </div>
        </main>

        <div class="bottom-section">
            <div class="mini-player">
                <div class="player-left">
                    <div class="album-art">
                        <img src="https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?q=80&w=100&auto=format&fit=crop" alt="Album Art">
                    </div>
                    <div class="song-info">
                        <div class="song-title">Carita de Angel</div>
                        <div class="song-artist">
                            <span class="local-badge"><i class="fa-solid fa-square"></i></span>
                            Maria Daniela Y Su Sonido Lasser
                        </div>
                    </div>
                </div>
                <div class="player-right">
                    <button class="icon-btn device-btn"><i class="fa-solid fa-tv"></i></button>
                    <button class="icon-btn play-btn" id="playBtn"><i class="fa-solid fa-play"></i></button>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <button class="nav-item active">
                    <i class="fa-solid fa-book-open nav-icon"></i>
                    <span>Kitaplığın</span>
                </button>
            </nav>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
