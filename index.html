<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitaplığın</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           1. CORE INTERFACE ARCHITECTURE & STANDARD RESET
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Phone Screen Chassis Form Factor */
        .app-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Header Navigation UI */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 45px 16px 12px 16px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #282828;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .add-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Screen Scrolling Layer Matrix */
        .content {
            padding: 8px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            position: relative;
        }

        .import-card {
            width: 100%;
            background-color: #121212;
            border: none;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        .import-card:active {
            background-color: #1a1a1a;
        }

        .import-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .import-icon {
            font-size: 20px;
            color: #ffffff;
            opacity: 0.9;
        }

        .import-text {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            text-align: left;
        }

        .arrow-icon {
            color: #ffffff;
            opacity: 0.8;
            font-size: 14px;
        }

        /* ==========================================================================
           2. PREMIUM TRUE 3D PERSPECTIVE GEOMETRIC SYSTEM (CANVAS LAYER)
           ========================================================================== */
        .library-3d-viewport {
            width: 100%;
            height: 330px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .coverflow-container {
            position: relative;
            width: 100%;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px; /* Deepens the spatial camera field depth */
            perspective-origin: 50% 28%; /* Angled slightly downward to view the thick top/side edges */
            transform-style: preserve-3d;
            cursor: grab;
        }

        .coverflow-container:active {
            cursor: grabbing;
        }

        /* THE HARDWARE EXTRUDED 3D RECTANGULAR CASE MATRICES */
        .album-3d-case {
            position: absolute;
            width: 152px;
            height: 152px;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
            user-select: none;
            /* Ultra-smooth cinematic reflection system */
            -webkit-box-reflect: below 18px linear-gradient(transparent, transparent 40%, rgba(255, 255, 255, 0.25));
        }

        /* Shared face presets for building solid thickness volumes */
        .case-face {
            position: absolute;
            background-color: #1c1c1c;
            backface-visibility: visible;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
        }

        /* FRONT ARTWORK FACE PLATE */
        .case-face.face-front {
            width: 152px;
            height: 152px;
            top: 0;
            left: 0;
            transform: rotateY(0deg) translateZ(12px); /* Offsets forward out of the core structural matrix axis */
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 6px;
            overflow: hidden;
            z-index: 5;
        }

        .case-face.face-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* LEFT EXTENSION BOUND SPINE WALL */
        .case-face.face-left {
            width: 24px; /* Extruded thickness depth parameter size */
            height: 152px;
            top: 0;
            left: -12px;
            transform: rotateY(-90deg) translateZ(0);
            background: linear-gradient(to right, #0a0a0a, #2d2d2d);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        /* RIGHT EXTENSION BOUND SPINE WALL */
        .case-face.face-right {
            width: 24px;
            height: 152px;
            top: 0;
            left: auto;
            right: -12px;
            transform: rotateY(90deg) translateZ(0);
            background: linear-gradient(to left, #0a0a0a, #2d2d2d);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }

        /* TOP DEPTH LID EDGE */
        .case-face.face-top {
            width: 152px;
            height: 24px;
            top: -12px;
            left: 0;
            transform: rotateX(90deg) translateZ(0);
            background: linear-gradient(to bottom, #3a3a3a, #111111);
            border: 1px solid rgba(255, 255, 255, 0.15);
            z-index: 4;
        }

        /* Vertical text printing on side thickness spines */
        .spine-text-vertical {
            font-size: 8px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 2px;
            transform: rotate(90deg);
            width: 132px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Center focus information labels display overlay layer */
        .center-track-title-display {
            position: absolute;
            bottom: 0px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 3px;
            padding: 0 16px;
            z-index: 100;
        }

        .center-main-title {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .center-sub-artist {
            font-size: 12px;
            font-weight: 500;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ==========================================================================
           3. BASE CONTENT ELEMENTS & PLAYER CONTROLS
           ========================================================================== */
        .tips-card {
            background-color: #121212;
            border-radius: 8px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-shrink: 0;
        }

        .tips-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .tips-label {
            font-size: 11px;
            font-weight: 600;
            color: #a7a7a7;
        }

        .close-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
        }

        .tips-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.1px;
        }

        .tips-subtitle {
            font-size: 13px;
            color: #b3b3b3;
