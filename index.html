<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitaplığın</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* UI Canvas Standardization Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Top Header Area Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 45px 16px 12px 16px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #282828;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .add-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Main Workspace Panels Scroll Track */
        .content {
            padding: 8px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            position: relative;
        }

        /* Import Action Trigger Panel */
        .import-card {
            width: 100%;
            background-color: #121212;
            border: none;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        .import-card:active {
            background-color: #1a1a1a;
        }

        .import-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .import-icon {
            font-size: 20px;
            color: #ffffff;
            opacity: 0.9;
        }

        .import-text {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            text-align: left;
            color: #ffffff;
        }

        .arrow-icon {
            color: #ffffff;
            opacity: 0.8;
            font-size: 14px;
        }

        /* -------------------------------------------------------------
           PREMIUM 3D GEOMETRIC CASING CAROUSEL VIEWPORT
        ------------------------------------------------------------- */
        .library-3d-viewport {
            width: 100%;
            height: 320px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .coverflow-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Creates a precise cinematic camera lens field of view */
            perspective: 800px;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .coverflow-container:active {
            cursor: grabbing;
        }

        /* THE 3D ALBUM CASE (Structural Assembly Core Element) */
        .album-3d-case {
            position: absolute;
            width: 160px;
            height: 160px;
            transform-style: preserve-3d;
            /* Fluid spring interpolations for rotation, depth tracking, and inertia adjustments */
            transition: transform 0.5s cubic-bezier(0.18, 0.9, 0.32, 1.05), opacity 0.4s ease;
            user-select: none;
            
            /* Ground floor reflection matching reference images */
            -webkit-box-reflect: below 12px linear-gradient(transparent, transparent 40%, rgba(255, 255, 255, 0.15));
        }

        /* Universal Side Face Assembly Standards */
        .case-face {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            backface-visibility: visible;
        }

        /* Front Album Surface Face */
        .case-face.face-front {
            transform: rotateY(0deg) translateZ(8px); /* Projected forward by half the depth value */
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 2;
        }

        .case-face.face-front img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .case-face.face-front i {
            font-size: 50px;
            color: rgba(255, 255, 255, 0.15);
        }

        /* Left Edge / Physical Casing Spine Side */
        .case-face.face-left {
            width: 16px; /* Explicit structural thickness match */
            left: -8px;
            transform: rotateY(-90deg) translateZ(0);
            background: linear-gradient(to right, #111111, #222222);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Right Edge / Physical Casing Spine Side */
        .case-face.face-right {
            width: 16px; /* Explicit structural thickness match */
            left: auto;
            right: -8px;
            transform: rotateY(90deg) translateZ(0);
            background: linear-gradient(to left, #111111, #222222);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* One-To-One Feature Representation:
           Physical Vertical Typography writing configuration running along the spine edges
        */
        .spine-text-vertical {
            font-size: 8px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 1px;
            /* Rotates the horizontal text layout perfectly onto the thin edge orientation line */
            transform: rotate(90deg);
            width: 140px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Static Readouts Display Panel below the center elements */
        .center-track-title-display {
            position: absolute;
            bottom: 16px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 24px;
        }

        .center-main-title {
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .center-sub-artist {
            font-size: 12px;
            font-weight: 500;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .viewport-empty-notice {
            position: absolute;
            font-size: 13px;
            font-weight: 600;
            color: #555555;
            text-align: center;
            pointer-events: none;
            padding: 0 40px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .viewport-empty-notice i {
            font-size: 32px;
            color: #222222;
        }

        /* Guide Helper Onboarding Box */
        .tips-card {
            background-color: #121212;
            border-radius: 8px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-shrink: 0;
        }

        .tips-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .tips-label {
            font-size: 11px;
            font-weight: 600;
            color: #a7a7a7;
        }

        .close-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
        }

        .tips-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.1px;
        }

        .tips-subtitle {
            font-size: 13px;
            color: #b3b3b3;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .action-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Fixed Placement Control Tray Deck */
        .bottom-section {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #000000;
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Custom Burgundy Mini Player Deck */
        .mini-player {
            background-color: #51071e; 
            margin: 0 8px 16px 8px;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .player-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .album-art {
            width: 38px;
            height: 38px;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            background-color: #282828;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album-art i {
            color: #b3b3b3;
            font-size: 16px;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .song-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 12px;
            color: #b3b3b3;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .local-badge {
            color: #1db954;
            font-size: 11px;
            display: flex;
            align-items: center;
        }

        .player-right {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-right: 8px;
        }

        .device-btn, .play-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            font-size: 16px;
            width: 20px;
        }

        /* Mini Progress Bar Line Styles */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 8px;
            right: 8px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.12);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #ffffff;
            transition: width 0.1s linear;
        }

        /* Bottom Tab Selector Grid */
        .bottom-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .nav-item {
            background: none;
            border: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .nav-icon {
            font-size: 20px;
            color: #ffffff;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
            color: #ffffff;
        }

        #hiddenFileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <audio id="audioEngine"></audio>
        <input type="file" id="hiddenFileInput" accept="audio/mp3, audio/*" multiple>

        <header class="header">
            <div class="header-left">
                <div class="profile-avatar">
                    <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?q=80&w=100&auto=format&fit=crop" alt="Profile">
                </div>
                <h1>Kitaplığın</h1>
            </div>
            <button class="add-btn" id="addBtnPlus"><i class="fa-solid fa-plus"></i></button>
        </header>

        <main class="content">
            <button class="import-card" id="importBtn">
                <div class="import-left">
                    <i class="fa-solid fa-arrow-down import-icon"></i>
                    <span class="import-text">Diğer uygulamalardaki müziklerini içe aktar</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </button>

            <div class="library-3d-viewport" id="dropZoneViewport">
                <div class="viewport-empty-notice" id="emptyNotice">
                    <i class="fa-solid fa-compact-disc"></i>
                    <span>Müzik dosyalarını buraya sürükleyin veya içe aktarın</span>
                </div>
                
                <div class="coverflow-container" id="coverflowContainer"></div>
                
                <div class="center-track-title-display" id="centerTrackTitleDisplay" style="display: none;">
                    <div class="center-main-title" id="centerMainTitle">Track Name</div>
                    <div class="center-sub-artist" id="centerSubArtist">Artist Name</div>
                </div>
            </div>

            <div class="tips-card" id="tipsCard">
                <div class="tips-header">
                    <span class="tips-label">İpuçları</span>
                    <button class="close-btn" id="closeTips"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <h2 class="tips-title">İlk çalma listeni oluştur</h2>
                <p class="tips-subtitle">Çok kolay. Sana yardımcı olacağız</p>
                <button class="action-btn">Çalma listesi oluştur</button>
            </div>
        </main>

        <div class="bottom-section">
            <div class="mini-player">
                <div class="player-left">
                    <div class="album-art" id="playerAlbumArtContainer">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <div class="song-info">
                        <div class="song-title" id="playerTitle">Carita de Angel</div>
                        <div class="song-artist">
                            <span class="local-badge"><i class="fa-solid fa-square-check"></i></span>
                            <span id="playerArtist">Maria Daniela Y Su Sonido Lasser</span>
                        </div>
                    </div>
                </div>
                <div class="player-right">
                    <button class="device-btn"><i class="fa-solid fa-mobile-screen-button"></i></button>
                    <button class="play-btn" id="playBtn"><i class="fa-solid fa-play"></i></button>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <button class="nav-item">
                    <i class="fa-solid fa-lines-leaning nav-icon"></i>
                    <span>Kitaplığın</span>
                </button>
            </nav>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let libraryTracksList = [];
            let focusedIndex = 0;
            
            // Motion tracking calculation references hooks
            let trackingMotionActive = false;
            let initialTouchX = 0;
            let slidingReferenceDeltaX = 0;

            // DOM UI component definitions links maps
            const closeTips = document.getElementById('closeTips');
            const tipsCard = document.getElementById('tipsCard');
            const playBtn = document.getElementById('playBtn');
            const importBtn = document.getElementById('importBtn');
            const addBtnPlus = document.getElementById('addBtnPlus');
            const fileInput = document.getElementById('hiddenFileInput');
            const audioEngine = document.getElementById('audioEngine');
            const dropZoneViewport = document.getElementById('dropZoneViewport');
            const coverflowContainer = document.getElementById('coverflowContainer');
            const emptyNotice = document.getElementById('emptyNotice');
            
            const centerTrackTitleDisplay = document.getElementById('centerTrackTitleDisplay');
            const centerMainTitle = document.getElementById('centerMainTitle');
            const centerSubArtist = document.getElementById('centerSubArtist');

            const playerTitle = document.getElementById('playerTitle');
            const playerArtist = document.getElementById('playerArtist');
            const progressFill = document.getElementById('progressFill');
            const playerAlbumArtContainer = document.getElementById('playerAlbumArtContainer');

            if (closeTips && tipsCard) {
                closeTips.addEventListener('click', () => tipsCard.style.display = 'none');
            }

            // Cinematic block matrix tones for cases backgrounds
            const dynamicCaseGradients = [
                'linear-gradient(135deg, #ff0055 0%, #7a0026 100%)',
                'linear-gradient(135deg, #00c6ff 0%, #0072ff 100%)',
                'linear-gradient(135deg, #f9d423 0%, #ff4e50 100%)',
                'linear-gradient(135deg, #b31217 0%, #e52d27 100%)',
                'linear-gradient(135deg, #00f260 0%, #0575e6 100%)',
                'linear-gradient(135deg, #8a2387 0%, #e94057 100%)'
            ];

            // ADVANCED STRUCTURAL MULTI-FACE 3D GEOMETRIC POSITIONING ENGINE
            function compute3DCaseSpaceTransforms() {
                if (libraryTracksList.length === 0) {
                    emptyNotice.style.display = 'flex';
                    centerTrackTitleDisplay.style.display = 'none';
                    return;
                }
                emptyNotice.style.display = 'none';
                centerTrackTitleDisplay.style.display = 'flex';

                const structuralCases = coverflowContainer.querySelectorAll('.album-3d-case');
                
                structuralCases.forEach((albumCase, idx) => {
                    const trackingOffset = idx - focusedIndex;
                    
                    let translateX = 0;
                    let rotateY = 0;
                    let translateZ = 0;
                    let opacityValue = 1;
                    let layeredZIndex = 100 - Math.abs(trackingOffset);

                    if (trackingOffset === 0) {
                        // Focused Active Node Facing Forward Completely
                        translateX = 0;
                        rotateY = 0;
                        translateZ = 130; // Shifts center block forward on Z axis
                        layeredZIndex = 600;
                        opacityValue = 1;
                    } else if (trackingOffset < 0) {
                        // Side Stack Left Profile Casing Setup
                        rotateY = 65; // High turning scale distortion factor 
                        translateX = (trackingOffset * 45) - 80; // Overlapping layout increments
                        translateZ = -40; // Steps elements smoothly into the background fields array layout
                        opacityValue = Math.max(0.15, 1 + (trackingOffset * 0.25));
                    } else if (trackingOffset > 0) {
                        // Side Stack Right Profile Casing Setup
                        rotateY = -65;
                        translateX = (trackingOffset * 45) + 80;
                        translateZ = -40;
                        opacityValue = Math.max(0.15, 1 - (trackingOffset * 0.25));
                    }

                    // Strict outer viewport boundary optimization mask tracking
                    if (Math.abs(trackingOffset) > 3) {
                        opacityValue = 0;
                    }

                    // Apply coordinate vectors matrix array calculations directly onto element chassis styles
                    albumCase.style.transform = `translateX(${translateX}px) rotateY(${rotateY}deg) translateZ(${translateZ}px)`;
                    albumCase.style.zIndex = layeredZIndex;
                    albumCase.style.opacity = opacityValue;
                });
            }

            function triggerFocusedTrackReorientation(targetIdx) {
                if (libraryTracksList.length === 0) return;
                
                focusedIndex = Math.max(0, Math.min(targetIdx, libraryTracksList.length - 1));
                compute3DCaseSpaceTransforms();

                const isolatedTrackNode = libraryTracksList[focusedIndex];
                
                // Update 3D center layout string readouts
                centerMainTitle.textContent = isolatedTrackNode.title;
                centerSubArtist.textContent = isolatedTrackNode.artist;

                // Synchronize attributes fields seamlessly over into fixed lower playback modules
                playerTitle.textContent = isolatedTrackNode.title;
                playerArtist.textContent = isolatedTrackNode.artist;
                playerAlbumArtContainer.style.background = isolatedTrackNode.caseBackdropTone;
                playerAlbumArtContainer.innerHTML = `<i class="fa-solid fa-compact-disc fa-spin" style="color: rgba(255,255,255,0.8); font-size:15px;"></i>`;

                // Load background audio sources securely
                audioEngine.src = isolatedTrackNode.blobObjectLinkUrl;
                audioEngine.play().catch(() => { /* Standard browser user interface security flags bypass */ });
            }

            function processSelectedFilesInputPackets(filesList) {
                let checkInitialLibraryBootState = (libraryTracksList.length === 0);

                for (let i = 0; i < filesList.length; i++) {
                    const musicFile = filesList[i];
                    if (!musicFile.type.startsWith('audio/')) continue;

                    let rawCleanedString = musicFile.name.replace(/\.[^/.]+$/, "");
                    let derivedTitleString = rawCleanedString;
                    let derivedArtistString = "Yerel Parça";

                    if (rawCleanedString.includes(" - ")) {
                        const wordSplitFragments = rawCleanedString.split(" - ");
                        derivedArtistString = wordSplitFragments[0].trim();
                        derivedTitleString = wordSplitFragments[1].trim();
                    }

                    const dynamicGradIndex = albumBackdropPalettesStyleIndex = libraryTracksList.length % dynamicCaseGradients.length;
                    const choiceBackdropTone = dynamicCaseGradients[dynamicGradIndex];
                    
                    const systemTrackPayload = {
                        title: derivedTitleString,
                        artist: derivedArtistString,
                        blobObjectLinkUrl: URL.createObjectURL(musicFile),
                        caseBackdropTone: choiceBackdropTone
                    };

                    libraryTracksList.push(systemTrackPayload);

                    // MULTI-FACE STRUCTURAL 3D CUBE CASE GENERATION HOOK
                    const physicalCaseNode = document.createElement('div');
                    physicalCaseNode.className = 'album-3d-case';
                    
                    // Creates true spatial thickness edges containing vertical song text layouts
                    physicalCaseNode.innerHTML = `
                        <div class="case-face face-left">
                            <div class="spine-text-vertical">${derivedTitleString}</div>
                        </div>
                        <div class="case-face face-front" style="background: ${choiceBackdropTone}">
                            <i class="fa-solid fa-record-vinyl"></i>
                        </div>
                        <div class="case-face face-right">
                            <div class="spine-text-vertical">${derivedTitleString}</div>
                        </div>
                    `;

                    const capturedScopeIndex = libraryTracksList.length - 1;
                    physicalCaseNode.addEventListener('click', () => {
                        if (focusedIndex !== capturedScopeIndex) {
                            triggerFocusedTrackReorientation(capturedScopeIndex);
                        }
                    });

                    coverflowContainer.appendChild(physicalCaseNode);
                }

                if (checkInitialLibraryBootState && libraryTracksList.length > 0) {
                    triggerFocusedTrackReorientation(0);
                } else {
                    compute3DCaseSpaceTransforms();
                }
            }

            // High Precision Mobile Touch Inertia Gestures Configurations
            dropZoneViewport.addEventListener('touchstart', (e) => {
                trackingMotionActive = true;
                initialTouchX = e.touches[0].clientX;
                slidingReferenceDeltaX = initialTouchX;
            }, { passive: true });

            dropZoneViewport.addEventListener('touchmove', (e) => {
                if (!trackingMotionActive || libraryTracksList.length === 0) return;
                const activeLiveTouchX = e.touches[0].clientX;
                const motionVectorDisplacement = activeLiveTouchX - slidingReferenceDeltaX;
                
                // Track finger motion offsets for seamless swiping steps
                if (Math.abs(motionVectorDisplacement) > 35) {
                    if (motionVectorDisplacement > 0 && focusedIndex > 0) {
                        triggerFocusedTrackReorientation(focusedIndex - 1);
                        trackingMotionActive = false; 
                    } else if (motionVectorDisplacement < 0 && focusedIndex < libraryTracksList.length - 1) {
                        triggerFocusedTrackReorientation(focusedIndex + 1);
                        trackingMotionActive = false;
                    }
                    slidingReferenceDeltaX = activeLiveTouchX;
                }
            }, { passive: true });

            window.addEventListener('touchend', () => trackingMotionActive = false);

            // Drag and Drop desktop execution processing layers
            ['dragenter', 'dragover'].forEach(name => {
                dropZoneViewport.addEventListener(name, (e) => {
                    e.preventDefault(); e.stopPropagation();
                }, false);
            });

            ['dragleave', 'drop'].forEach(name => {
                dropZoneViewport.addEventListener(name, (e) => {
                    e.preventDefault(); e.stopPropagation();
                }, false);
            });

            dropZoneViewport.addEventListener('drop', (e) => {
                const systemPacketPayload = e.dataTransfer;
                if (systemPacketPayload && systemPacketPayload.files.length > 0) {
                    processSelectedFilesInputPackets(systemPacketPayload.files);
                }
            }, false);

            if (importBtn) importBtn.addEventListener('click', () => fileInput.click());
            if (addBtnPlus) addBtnPlus.addEventListener('click', () => fileInput.click());
            
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        processSelectedFilesInputPackets(e.target.files);
                    }
                });
            }

            // Interactive Audio Engine Modules Playback Link Mapping Connections
            if (playBtn && audioEngine) {
                playBtn.addEventListener('click', () => {
                    if (libraryTracksList.length === 0) {
                        fileInput.click();
                        return;
                    }
                    if (audioEngine.paused) {
                        audioEngine.play();
                    } else {
                        audioEngine.pause();
                    }
                });

                audioEngine.addEventListener('play', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                });

                audioEngine.addEventListener('pause', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                });

                audioEngine.addEventListener('timeupdate', () => {
                    if (audioEngine.duration) {
                        const runtimeProgressPercentageValue = (audioEngine.currentTime / audioEngine.duration) * 100;
                        progressFill.style.width = `${runtimeProgressPercentageValue}%`;
                    }
                });

                audioEngine.addEventListener('ended', () => {
                    if (focusedIndex < libraryTracksList.length - 1) {
                        triggerFocusedTrackReorientation(focusedIndex + 1);
                    } else {
                        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                        progressFill.style.width = '0%';
                    }
                });
            }

            window.addEventListener('resize', compute3DCaseSpaceTransforms);
        });
    </script>
</body>
</html>
