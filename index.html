<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitaplığın</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* UI Canvas Standardization Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Top Header Area Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px 16px 12px 16px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #282828;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .add-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Main Workspace Panels Scroll Track */
        .content {
            padding: 8px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
            position: relative;
        }

        /* Trigger Block: Local File Import Panel */
        .import-card {
            width: 100%;
            background-color: #1e1e1e;
            border: none;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        .import-card:active {
            background-color: #242424;
        }

        .import-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .import-icon {
            font-size: 20px;
            color: #ffffff;
            opacity: 0.9;
        }

        .import-text {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            text-align: left;
            color: #ffffff;
            max-width: 250px;
        }

        .arrow-icon {
            color: #ffffff;
            opacity: 0.9;
            font-size: 14px;
        }

        /* PREMIUM 3D COVER FLOW DISPLAY VIEWPORT */
        .library-3d-viewport {
            width: 100%;
            height: 280px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #070707 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            /* Enhanced perspective depth field for realistic distortion vanishing points */
            perspective: 1000px; 
            border: 2px dashed rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);
        }

        .library-3d-viewport.drag-over {
            border-color: #1db954;
            background: radial-gradient(circle at center, #112d18 0%, #050e07 100%);
        }

        .coverflow-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Essential flag to pass down 3D space vectors to child elements */
            transform-style: preserve-3d;
            cursor: grab;
        }

        .coverflow-container:active {
            cursor: grabbing;
        }

        /* Realistic Physical Album Sleeve Elements */
        .album-spine-card {
            position: absolute;
            width: 155px;
            height: 210px;
            background-color: #1c1c1c;
            border-radius: 8px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 1px 3px rgba(255,255,255,0.1);
            /* Ultra fluid spring transform transition curves */
            transition: transform 0.4s cubic-bezier(0.2, 0.85, 0.3, 1), opacity 0.35s ease;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        /* High gloss specular highlight reflection layer */
        .album-spine-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(125deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 30%, rgba(0,0,0,0) 31%);
            pointer-events: none;
            z-index: 5;
        }

        .album-spine-art {
            width: 100%;
            height: 150px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.4);
        }

        .album-spine-art i {
            font-size: 42px;
            color: rgba(255, 255, 255, 0.25);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .album-spine-details {
            padding: 10px 8px;
            background: linear-gradient(to bottom, #181818 0%, #111111 100%);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.03);
        }

        .album-spine-title {
            font-size: 12px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 3px;
            max-width: 100%;
            text-align: center;
        }

        .album-spine-artist {
            font-size: 10px;
            font-weight: 500;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            text-align: center;
        }

        .viewport-empty-notice {
            position: absolute;
            font-size: 13px;
            font-weight: 600;
            color: #727272;
            text-align: center;
            pointer-events: none;
            padding: 0 40px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .viewport-empty-notice i {
            font-size: 32px;
            color: #3a3a3a;
        }

        /* Guide Helper Onboarding Box */
        .tips-card {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-shrink: 0;
        }

        .tips-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .tips-label {
            font-size: 11px;
            font-weight: 600;
            color: #a7a7a7;
        }

        .close-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
        }

        .tips-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.1px;
        }

        .tips-subtitle {
            font-size: 13px;
            color: #b3b3b3;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .action-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Fixed Placement Control Tray Deck */
        .bottom-section {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #121212;
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Custom Burgundy Mini Player Deck */
        .mini-player {
            background-color: #51071e; 
            margin: 0 8px 16px 8px;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .player-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .album-art {
            width: 38px;
            height: 38px;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            background-color: #282828;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .album-art i {
            color: #b3b3b3;
            font-size: 16px;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .song-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 12px;
            color: #b3b3b3;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .local-badge {
            color: #1db954;
            font-size: 11px;
            display: flex;
            align-items: center;
        }

        .player-right {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-right: 8px;
        }

        .device-btn, .play-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            font-size: 16px;
            width: 20px;
        }

        /* Mini Media Audio Timeline Track Components */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 8px;
            right: 8px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.12);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #ffffff;
            transition: width 0.1s linear;
        }

        /* Bottom Tab Selector Grid */
        .bottom-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .nav-item {
            background: none;
            border: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .nav-icon {
            font-size: 20px;
            color: #ffffff;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
            color: #ffffff;
        }

        #hiddenFileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <audio id="audioEngine"></audio>
        <input type="file" id="hiddenFileInput" accept="audio/mp3, audio/*" multiple>

        <header class="header">
            <div class="header-left">
                <div class="profile-avatar">
                    <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?q=80&w=100&auto=format&fit=crop" alt="Profile">
                </div>
                <h1>Kitaplığın</h1>
            </div>
            <button class="add-btn" id="addBtnPlus"><i class="fa-solid fa-plus"></i></button>
        </header>

        <main class="content">
            <button class="import-card" id="importBtn">
                <div class="import-left">
                    <i class="fa-solid fa-square-rss import-icon"></i>
                    <span class="import-text">Diğer uygulamalardaki müziklerini içe aktar</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </button>

            <div class="library-3d-viewport" id="dropZoneViewport">
                <div class="viewport-empty-notice" id="emptyNotice">
                    <i class="fa-solid fa-compact-disc fa-spin" style="animation-duration: 6s;"></i>
                    <span>Müzik dosyalarını bu alana sürükleyin ya da içe aktarma butonunu kullanın</span>
                </div>
                <div class="coverflow-container" id="coverflowContainer">
                    </div>
            </div>

            <div class="tips-card" id="tipsCard">
                <div class="tips-header">
                    <span class="tips-label">İpuçları</span>
                    <button class="close-btn" id="closeTips"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <h2 class="tips-title">İlk çalma listeni oluştur</h2>
                <p class="tips-subtitle">Çok kolay. Sana yardımcı olacağız</p>
                <button class="action-btn">Çalma listesi oluştur</button>
            </div>
        </main>

        <div class="bottom-section">
            <div class="mini-player">
                <div class="player-left">
                    <div class="album-art" id="playerAlbumArtContainer">
                        <i class="fa-solid fa-music" id="fallbackMusicIcon"></i>
                    </div>
                    <div class="song-info">
                        <div class="song-title" id="playerTitle">Carita de Angel</div>
                        <div class="song-artist">
                            <span class="local-badge"><i class="fa-solid fa-square-check"></i></span>
                            <span id="playerArtist">Maria Daniela Y Su Sonido Lasser</span>
                        </div>
                    </div>
                </div>
                <div class="player-right">
                    <button class="device-btn"><i class="fa-solid fa-laptop-medical"></i></button>
                    <button class="play-btn" id="playBtn"><i class="fa-solid fa-play"></i></button>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <button class="nav-item">
                    <i class="fa-solid fa-lines-leaning nav-icon"></i>
                    <span>Kitaplığın</span>
                </button>
            </nav>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let libraryTracks = [];
            let activeTrackIndex = 0;
            
            // Interaction tracking states
            let touchActive = false;
            let initialTouchX = 0;
            let trackedDeltaX = 0;

            // DOM UI Component Hooks
            const closeTips = document.getElementById('closeTips');
            const tipsCard = document.getElementById('tipsCard');
            const playBtn = document.getElementById('playBtn');
            const importBtn = document.getElementById('importBtn');
            const addBtnPlus = document.getElementById('addBtnPlus');
            const fileInput = document.getElementById('hiddenFileInput');
            const audioEngine = document.getElementById('audioEngine');
            const dropZoneViewport = document.getElementById('dropZoneViewport');
            const coverflowContainer = document.getElementById('coverflowContainer');
            const emptyNotice = document.getElementById('emptyNotice');
            
            const playerTitle = document.getElementById('playerTitle');
            const playerArtist = document.getElementById('playerArtist');
            const progressFill = document.getElementById('progressFill');
            const playerAlbumArtContainer = document.getElementById('playerAlbumArtContainer');

            if (closeTips && tipsCard) {
                closeTips.addEventListener('click', () => tipsCard.style.display = 'none');
            }

            // Authentic geometric contrast gradient spectrum blocks for covers
            const colorfulSleeveBackdrops = [
                'linear-gradient(135deg, #f5576c 0%, #f093fb 100%)',
                'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
                'linear-gradient(135deg, #f6d365 0%, #fda085 100%)',
                'linear-gradient(135deg, #5ee7df 0%, #b490ca 100%)',
                'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)'
            ];

            // ADVANCED 3D POSITION AND LAYER RENDERING MATRIX ENGINE
            function render3DCoverflowLayout() {
                if (libraryTracks.length === 0) {
                    emptyNotice.style.display = 'flex';
                    return;
                }
                emptyNotice.style.display = 'none';

                const cards = coverflowContainer.querySelectorAll('.album-spine-card');
                cards.forEach((card, idx) => {
                    const structuralDistance = idx - activeTrackIndex;
                    
                    let positionX = structuralDistance * 60; // Tighter overlapping horizontal alignment steps
                    let angleRotationY = 0;
                    let projectDepthZ = 0;
                    let absoluteZIndex = 100 - Math.abs(structuralDistance);
                    let visualOpacity = 1;

                    // Compute true 3D geometric positioning values
                    if (structuralDistance < 0) {
                        angleRotationY = 65;       // Sharp authentic turning angle profile
                        positionX -= 45;          // Push sideways to compensate depth profile compression
                        projectDepthZ = -150;     // Fall back cleanly along spatial Z axis
                    } else if (structuralDistance > 0) {
                        angleRotationY = -65;      // Opposite sharp turning angle profile
                        positionX += 45;
                        projectDepthZ = -150;
                    } else {
                        angleRotationY = 0;
                        projectDepthZ = 100;      // Project the active center forward aggressively
                        absoluteZIndex = 500;     // Keep current focused node fully on top
                    }

                    // Soften visual focus on elements stacked deep on peripheral borders
                    if (Math.abs(structuralDistance) > 2) {
                        visualOpacity = 0.4 - (Math.abs(structuralDistance) * 0.05);
                    }
                    if (Math.abs(structuralDistance) > 4) {
                        visualOpacity = 0; // Cull extreme nodes gracefully
                    }

                    card.style.transform = `translateX(${positionX}px) rotateY(${angleRotationY}deg) translateZ(${projectDepthZ}px)`;
                    card.style.zIndex = absoluteZIndex;
                    card.style.opacity = Math.max(0, visualOpacity);
                });
            }

            function syncMediaTrackFocus(trackIdx) {
                if (libraryTracks.length === 0) return;
                
                activeTrackIndex = Math.max(0, Math.min(trackIdx, libraryTracks.length - 1));
                render3DCoverflowLayout();

                const targetTrack = libraryTracks[activeTrackIndex];
                playerTitle.textContent = targetTrack.title;
                playerArtist.textContent = targetTrack.artist;
                
                // Synchronize color tones over into mini-player cover frame context directly
                playerAlbumArtContainer.style.background = targetTrack.sleeveColor;
                playerAlbumArtContainer.innerHTML = `<i class="fa-solid fa-compact-disc fa-spin" style="color: rgba(255,255,255,0.7); font-size:16px;"></i>`;

                // Update system playback sources pipeline nodes
                audioEngine.src = targetTrack.blobStreamURL;
                audioEngine.play().catch(() => { /* Sandbox guard tracking wrapper */ });
            }

            function processIncomingAudioFiles(filesList) {
                let triggeringInitialLoad = (libraryTracks.length === 0);

                for (let i = 0; i < filesList.length; i++) {
                    const targetFile = filesList[i];
                    if (!targetFile.type.startsWith('audio/')) continue;

                    let baseCleanName = targetFile.name.replace(/\.[^/.]+$/, "");
                    let derivedTitle = baseCleanName;
                    let derivedArtist = "Yerel Kitaplık";

                    if (baseCleanName.includes(" - ")) {
                        const fragments = baseCleanName.split(" - ");
                        derivedArtist = fragments[0].trim();
                        derivedTitle = fragments[1].trim();
                    }

                    const uniqueSleeveTone = colorfulSleeveBackdrops[libraryTracks.length % colorfulSleeveBackdrops.length];
                    
                    const recordNode = {
                        title: derivedTitle,
                        artist: derivedArtist,
                        blobStreamURL: URL.createObjectURL(targetFile),
                        sleeveColor: uniqueSleeveTone
                    };

                    libraryTracks.push(recordNode);

                    // Build premium physical texture component layers
                    const cardWrapper = document.createElement('div');
                    cardWrapper.className = 'album-spine-card';
                    cardWrapper.innerHTML = `
                        <div class="album-spine-art" style="background: ${uniqueSleeveTone}">
                            <i class="fa-solid fa-record-vinyl"></i>
                        </div>
                        <div class="album-spine-details">
                            <div class="album-spine-title">${derivedTitle}</div>
                            <div class="album-spine-artist">${derivedArtist}</div>
                        </div>
                    `;

                    const assignedIndex = libraryTracks.length - 1;
                    cardWrapper.addEventListener('click', () => {
                        if (activeTrackIndex !== assignedIndex) {
                            syncMediaTrackFocus(assignedIndex);
                        }
                    });

                    coverflowContainer.appendChild(cardWrapper);
                }

                if (triggeringInitialLoad && libraryTracks.length > 0) {
                    syncMediaTrackFocus(0);
                } else {
                    render3DCoverflowLayout();
                }
            }

            // Touch Motion Gestures Event Listeners 
            dropZoneViewport.addEventListener('touchstart', (e) => {
                touchActive = true;
                initialTouchX = e.touches[0].clientX;
                trackedDeltaX = initialTouchX;
            }, { passive: true });

            dropZoneViewport.addEventListener('touchmove', (e) => {
                if (!touchActive || libraryTracks.length === 0) return;
                const activeTouchX = e.touches[0].clientX;
                const directionalMovementDistance = activeTouchX - trackedDeltaX;
                
                // Fine tuned touch deflection thresholds for precise snapping responses
                if (Math.abs(directionalMovementDistance) > 40) {
                    if (directionalMovementDistance > 0 && activeTrackIndex > 0) {
                        syncMediaTrackFocus(activeTrackIndex - 1);
                        touchActive = false; 
                    } else if (directionalMovementDistance < 0 && activeTrackIndex < libraryTracks.length - 1) {
                        syncMediaTrackFocus(activeTrackIndex + 1);
                        touchActive = false;
                    }
                    trackedDeltaX = activeTouchX;
                }
            }, { passive: true });

            window.addEventListener('touchend', () => touchActive = false);

            // Drag and Drop Desktop System Target Interfaces
            ['dragenter', 'dragover'].forEach(name => {
                dropZoneViewport.addEventListener(name, (e) => {
                    e.preventDefault(); e.stopPropagation();
                    dropZoneViewport.classList.add('drag-over');
                }, false);
            });

            ['dragleave', 'drop'].forEach(name => {
                dropZoneViewport.addEventListener(name, (e) => {
                    e.preventDefault(); e.stopPropagation();
                    dropZoneViewport.classList.remove('drag-over');
                }, false);
            });

            dropZoneViewport.addEventListener('drop', (e) => {
                const transferPacket = e.dataTransfer;
                if (transferPacket && transferPacket.files.length > 0) {
                    processIncomingAudioFiles(transferPacket.files);
                }
            }, false);

            if (importBtn) importBtn.addEventListener('click', () => fileInput.click());
            if (addBtnPlus) addBtnPlus.addEventListener('click', () => fileInput.click());
            
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        processIncomingAudioFiles(e.target.files);
                    }
                });
            }

            // Media Audio Playback Engine Events Map Linking
            if (playBtn && audioEngine) {
                playBtn.addEventListener('click', () => {
                    if (libraryTracks.length === 0) {
                        fileInput.click();
                        return;
                    }
                    if (audioEngine.paused) {
                        audioEngine.play();
                    } else {
                        audioEngine.pause();
                    }
                });

                audioEngine.addEventListener('play', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                    const activeDisc = coverflowContainer.querySelectorAll('.album-spine-card i')[activeTrackIndex];
                    if (activeDisc) activeDisc.classList.add('fa-spin');
                });

                audioEngine.addEventListener('pause', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                    const activeDisc = coverflowContainer.querySelectorAll('.album-spine-card i')[activeTrackIndex];
                    if (activeDisc) activeDisc.classList.remove('fa-spin');
                });

                audioEngine.addEventListener('timeupdate', () => {
                    if (audioEngine.duration) {
                        const trackPercentScore = (audioEngine.currentTime / audioEngine.duration) * 100;
                        progressFill.style.width = `${trackPercentScore}%`;
                    }
                });

                audioEngine.addEventListener('ended', () => {
                    if (activeTrackIndex < libraryTracks.length - 1) {
                        syncMediaTrackFocus(activeTrackIndex + 1);
                    } else {
                        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                        progressFill.style.width = '0%';
                    }
                });
            }

            window.addEventListener('resize', render3DCoverflowLayout);
        });
    </script>
</body>
</html>
