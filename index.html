<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitaplığın</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* UI Canvas Standardization Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Top Header Area Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 45px 16px 12px 16px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #282828;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .add-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Main Workspace Content Area */
        .content {
            padding: 8px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            position: relative;
        }

        /* Import Action Panel */
        .import-card {
            width: 100%;
            background-color: #121212;
            border: none;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
            flex-shrink: 0;
        }

        .import-card:active {
            background-color: #1a1a1a;
        }

        .import-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .import-icon {
            font-size: 20px;
            color: #ffffff;
            opacity: 0.9;
        }

        .import-text {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            text-align: left;
            color: #ffffff;
        }

        .arrow-icon {
            color: #ffffff;
            opacity: 0.8;
            font-size: 14px;
        }

        /* -------------------------------------------------------------
           ONE-TO-ONE 100% ACCURATE 3D COVER FLOW VIEWPORT LAYER
        ------------------------------------------------------------- */
        .library-3d-viewport {
            width: 100%;
            height: 300px;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
        }

        .coverflow-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Establishes the exact 3D visual canvas perspective field */
            perspective: 750px;
            transform-style: preserve-3d;
            cursor: grab;
        }

        .coverflow-container:active {
            cursor: grabbing;
        }

        /* Absolute Physical Square Album Slits */
        .album-spine-card {
            position: absolute;
            width: 165px;
            height: 165px;
            background-color: #181818;
            border-radius: 2px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            /* Smooth fluid mechanical ease transition curves */
            transition: transform 0.45s cubic-bezier(0.25, 1, 0.3, 1), opacity 0.4s ease;
            transform-style: preserve-3d;
            overflow: visible;
            user-select: none;
            
            /* TRUE 3D FLOOR REFLECTION EFFECT */
            -webkit-box-reflect: below 6px linear-gradient(transparent, transparent 50%, rgba(255, 255, 255, 0.20));
        }

        .album-spine-art {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .album-spine-art i {
            font-size: 50px;
            color: rgba(255, 255, 255, 0.2);
        }

        /* Dynamic Title Overlays displayed below the center track */
        .center-track-title-display {
            position: absolute;
            bottom: 12px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 0 24px;
        }

        .center-main-title {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .center-sub-artist {
            font-size: 12px;
            font-weight: 500;
            color: #b3b3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .viewport-empty-notice {
            position: absolute;
            font-size: 13px;
            font-weight: 600;
            color: #555555;
            text-align: center;
            pointer-events: none;
            padding: 0 40px;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .viewport-empty-notice i {
            font-size: 32px;
            color: #222222;
        }

        /* Guide Helper Onboarding Box */
        .tips-card {
            background-color: #121212;
            border-radius: 8px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex-shrink: 0;
        }

        .tips-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .tips-label {
            font-size: 11px;
            font-weight: 600;
            color: #a7a7a7;
        }

        .close-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
        }

        .tips-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.1px;
        }

        .tips-subtitle {
            font-size: 13px;
            color: #b3b3b3;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .action-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Fixed Placement Bottom Control Panel Area */
        .bottom-section {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #000000;
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        /* Custom Burgundy Mini Player Deck */
        .mini-player {
            background-color: #51071e; 
            margin: 0 8px 16px 8px;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .player-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .album-art {
            width: 38px;
            height: 38px;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            background-color: #282828;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album-art i {
            color: #b3b3b3;
            font-size: 16px;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .song-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 12px;
            color: #b3b3b3;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .local-badge {
            color: #1db954;
            font-size: 11px;
            display: flex;
            align-items: center;
        }

        .player-right {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-right: 8px;
        }

        .device-btn, .play-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            font-size: 16px;
            width: 20px;
        }

        /* Audio Timeline Progress Components */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 8px;
            right: 8px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.12);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #ffffff;
            transition: width 0.1s linear;
        }

        /* Bottom Tab Selector Grid */
        .bottom-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .nav-item {
            background: none;
            border: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .nav-icon {
            font-size: 20px;
            color: #ffffff;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
            color: #ffffff;
        }

        #hiddenFileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <audio id="audioEngine"></audio>
        <input type="file" id="hiddenFileInput" accept="audio/mp3, audio/*" multiple>

        <header class="header">
            <div class="header-left">
                <div class="profile-avatar">
                    <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?q=80&w=100&auto=format&fit=crop" alt="Profile">
                </div>
                <h1>Kitaplığın</h1>
            </div>
            <button class="add-btn" id="addBtnPlus"><i class="fa-solid fa-plus"></i></button>
        </header>

        <main class="content">
            <button class="import-card" id="importBtn">
                <div class="import-left">
                    <i class="fa-solid fa-arrow-down import-icon"></i>
                    <span class="import-text">Diğer uygulamalardaki müziklerini içe aktar</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </button>

            <div class="library-3d-viewport" id="dropZoneViewport">
                <div class="viewport-empty-notice" id="emptyNotice">
                    <i class="fa-solid fa-compact-disc"></i>
                    <span>Müzik dosyalarını buraya sürükleyin veya içe aktarın</span>
                </div>
                
                <div class="coverflow-container" id="coverflowContainer"></div>
                
                <div class="center-track-title-display" id="centerTrackTitleDisplay" style="display: none;">
                    <div class="center-main-title" id="centerMainTitle">Track Name</div>
                    <div class="center-sub-artist" id="centerSubArtist">Artist Name</div>
                </div>
            </div>

            <div class="tips-card" id="tipsCard">
                <div class="tips-header">
                    <span class="tips-label">İpuçları</span>
                    <button class="close-btn" id="closeTips"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <h2 class="tips-title">İlk çalma listeni oluştur</h2>
                <p class="tips-subtitle">Çok kolay. Sana yardımcı olacağız</p>
                <button class="action-btn">Çalma listesi oluştur</button>
            </div>
        </main>

        <div class="bottom-section">
            <div class="mini-player">
                <div class="player-left">
                    <div class="album-art" id="playerAlbumArtContainer">
                        <i class="fa-solid fa-music"></i>
                    </div>
                    <div class="song-info">
                        <div class="song-title" id="playerTitle">Carita de Angel</div>
                        <div class="song-artist">
                            <span class="local-badge"><i class="fa-solid fa-square-check"></i></span>
                            <span id="playerArtist">Maria Daniela Y Su Sonido Lasser</span>
                        </div>
                    </div>
                </div>
                <div class="player-right">
                    <button class="device-btn"><i class="fa-solid fa-mobile-screen-button"></i></button>
                    <button class="play-btn" id="playBtn"><i class="fa-solid fa-play"></i></button>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <button class="nav-item">
                    <i class="fa-solid fa-lines-leaning nav-icon"></i>
                    <span>Kitaplığın</span>
                </button>
            </nav>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            let libraryTracksList = [];
            let focusedIndex = 0;
            
            // Swipe gesture configuration states
            let interactionActive = false;
            let touchOriginX = 0;
            let referenceDeltaX = 0;

            // DOM Hooks references mapping
            const closeTips = document.getElementById('closeTips');
            const tipsCard = document.getElementById('tipsCard');
            const playBtn = document.getElementById('playBtn');
            const importBtn = document.getElementById('importBtn');
            const addBtnPlus = document.getElementById('addBtnPlus');
            const fileInput = document.getElementById('hiddenFileInput');
            const audioEngine = document.getElementById('audioEngine');
            const dropZoneViewport = document.getElementById('dropZoneViewport');
            const coverflowContainer = document.getElementById('coverflowContainer');
            const emptyNotice = document.getElementById('emptyNotice');
            
            const centerTrackTitleDisplay = document.getElementById('centerTrackTitleDisplay');
            const centerMainTitle = document.getElementById('centerMainTitle');
            const centerSubArtist = document.getElementById('centerSubArtist');

            const playerTitle = document.getElementById('playerTitle');
            const playerArtist = document.getElementById('playerArtist');
            const progressFill = document.getElementById('progressFill');
            const playerAlbumArtContainer = document.getElementById('playerAlbumArtContainer');

            if (closeTips && tipsCard) {
                closeTips.addEventListener('click', () => tipsCard.style.display = 'none');
            }

            // High-saturation spectrum gradients for authentic album sleeves
            const albumBackdropPalettes = [
                'linear-gradient(135deg, #ff0055 0%, #7a0026 100%)',
                'linear-gradient(135deg, #00c6ff 0%, #0072ff 100%)',
                'linear-gradient(135deg, #f9d423 0%, #ff4e50 100%)',
                'linear-gradient(135deg, #b31217 0%, #e52d27 100%)',
                'linear-gradient(135deg, #00f260 0%, #0575e6 100%)',
                'linear-gradient(135deg, #8a2387 0%, #e94057 100%)'
            ];

            // 100% ACCURATE TRUE 3D PERSPECTIVE COVER FLOW LAYOUT FORMULA
            function refresh3DSpaceTransforms() {
                if (libraryTracksList.length === 0) {
                    emptyNotice.style.display = 'flex';
                    centerTrackTitleDisplay.style.display = 'none';
                    return;
                }
                emptyNotice.style.display = 'none';
                centerTrackTitleDisplay.style.display = 'flex';

                const cardNodes = coverflowContainer.querySelectorAll('.album-spine-card');
                
                cardNodes.forEach((card, idx) => {
                    const offsetSeparation = idx - focusedIndex;
                    
                    let translateX = 0;
                    let rotateY = 0;
                    let translateZ = 0;
                    let visualOpacity = 1;
                    let calculatedZIndex = 100 - Math.abs(offsetSeparation);

                    if (offsetSeparation === 0) {
                        // Central Face Forward Track
                        translateX = 0;
                        rotateY = 0;
                        translateZ = 140; // Projects forward aggressively along the Z-Axis
                        calculatedZIndex = 500;
                        visualOpacity = 1;
                    } else if (offsetSeparation < 0) {
                        // Left-side Stacked covers turned inward sharp
                        rotateY = 60; // Clean precise 3D side turning angle
                        translateX = (offsetSeparation * 40) - 90; // Stack tightly together
                        translateZ = 0;
                        visualOpacity = Math.max(0.2, 1 + (offsetSeparation * 0.25));
                    } else if (offsetSeparation > 0) {
                        // Right-side Stacked covers turned outward sharp
                        rotateY = -60;
                        translateX = (offsetSeparation * 40) + 90;
                        translateZ = 0;
                        visualOpacity = Math.max(0.2, 1 - (offsetSeparation * 0.25));
                    }

                    // Strict boundary culling to ensure perfect scannability layout
                    if (Math.abs(offsetSeparation) > 3) {
                        visualOpacity = 0;
                    }

                    card.style.transform = `translateX(${translateX}px) rotateY(${rotateY}deg) translateZ(${translateZ}px)`;
                    card.style.zIndex = calculatedZIndex;
                    card.style.opacity = visualOpacity;
                });
            }

            function reorientFocusTrack(targetIdx) {
                if (libraryTracksList.length === 0) return;
                
                focusedIndex = Math.max(0, Math.min(targetIdx, libraryTracksList.length - 1));
                refresh3DSpaceTransforms();

                const activeTrackNode = libraryTracksList[focusedIndex];
                
                // Update 3D center layout string readouts
                centerMainTitle.textContent = activeTrackNode.title;
                centerSubArtist.textContent = activeTrackNode.artist;

                // Sync context data down seamlessly into Burgundy Tray Deck elements
                playerTitle.textContent = activeTrackNode.title;
                playerArtist.textContent = activeTrackNode.artist;
                playerAlbumArtContainer.style.background = activeTrackNode.sleeveGradient;
                playerAlbumArtContainer.innerHTML = `<i class="fa-solid fa-compact-disc fa-spin" style="color: rgba(255,255,255,0.8); font-size:15px;"></i>`;

                // Load audio source stream safely
                audioEngine.src = activeTrackNode.virtualObjectUrl;
                audioEngine.play().catch(() => { /* Defer runtime browser prompt warnings gracefully */ });
            }

            function pushSelectedFilesIntoEngine(files) {
                let triggeringFreshBoot = (libraryTracksList.length === 0);

                for (let i = 0; i < files.length; i++) {
                    const trackingFile = files[i];
                    if (!trackingFile.type.startsWith('audio/')) continue;

                    let cleanFileName = trackingFile.name.replace(/\.[^/.]+$/, "");
                    let parsedTitle = cleanFileName;
                    let parsedArtist = "Yerel Parça";

                    if (cleanFileName.includes(" - ")) {
                        const chunks = cleanFileName.split(" - ");
                        parsedArtist = chunks[0].trim();
                        parsedTitle = chunks[1].trim();
                    }

                    const dynamicColorTone = albumBackdropPalettes[libraryTracksList.length % albumBackdropPalettes.length];
                    
                    const musicTrackItem = {
                        title: parsedTitle,
                        artist: parsedArtist,
                        virtualObjectUrl: URL.createObjectURL(trackingFile),
                        sleeveGradient: dynamicColorTone
                    };

                    libraryTracksList.push(musicTrackItem);

                    // Build premium physical texture element cards
                    const albumCard = document.createElement('div');
                    albumCard.className = 'album-spine-card';
                    albumCard.innerHTML = `
                        <div class="album-spine-art" style="background: ${dynamicColorTone}">
                            <i class="fa-solid fa-record-vinyl"></i>
                        </div>
                    `;

                    const currentIndexedReference = libraryTracksList.length - 1;
                    albumCard.addEventListener('click', () => {
                        if (focusedIndex !== currentIndexedReference) {
                            reorientFocusTrack(currentIndexedReference);
                        }
                    });

                    coverflowContainer.appendChild(albumCard);
                }

                if (triggeringFreshBoot && libraryTracksList.length > 0) {
                    reorientFocusTrack(0);
                } else {
                    refresh3DSpaceTransforms();
                }
            }

            // High precision Touch Gesture Interaction Loop Configurations
            dropZoneViewport.addEventListener('touchstart', (e) => {
                interactionActive = true;
                touchOriginX = e.touches[0].clientX;
                referenceDeltaX = touchOriginX;
            }, { passive: true });

            dropZoneViewport.addEventListener('touchmove', (e) => {
                if (!interactionActive || libraryTracksList.length === 0) return;
                const dynamicCurrentTouchX = e.touches[0].clientX;
                const dynamicDisplacementDelta = dynamicCurrentTouchX - referenceDeltaX;
                
                // Optimized deflection distance sensitivity settings
                if (Math.abs(dynamicDisplacementDelta) > 35) {
                    if (dynamicDisplacementDelta > 0 && focusedIndex > 0) {
                        reorientFocusTrack(focusedIndex - 1);
                        interactionActive = false; 
                    } else if (dynamicDisplacementDelta < 0 && focusedIndex < libraryTracksList.length - 1) {
                        reorientFocusTrack(focusedIndex + 1);
                        interactionActive = false;
                    }
                    referenceDeltaX = dynamicCurrentTouchX;
                }
            }, { passive: true });

            window.addEventListener('touchend', () => interactionActive = false);

            // Drag and drop processing loops
            ['dragenter', 'dragover'].forEach(name => {
                dropZoneViewport.addEventListener(name, (e) => {
                    e.preventDefault(); e.stopPropagation();
                }, false);
            });

            ['dragleave', 'drop'].forEach(name => {
                dropZoneViewport.addEventListener(name, (e) => {
                    e.preventDefault(); e.stopPropagation();
                }, false);
            });

            dropZoneViewport.addEventListener('drop', (e) => {
                const dataTransferPacket = e.dataTransfer;
                if (dataTransferPacket && dataTransferPacket.files.length > 0) {
                    pushSelectedFilesIntoEngine(dataTransferPacket.files);
                }
            }, false);

            if (importBtn) importBtn.addEventListener('click', () => fileInput.click());
            if (addBtnPlus) addBtnPlus.addEventListener('click', () => fileInput.click());
            
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        pushSelectedFilesIntoEngine(e.target.files);
                    }
                });
            }

            // Audio Core Media Playback Execution Node Events Links
            if (playBtn && audioEngine) {
                playBtn.addEventListener('click', () => {
                    if (libraryTracksList.length === 0) {
                        fileInput.click();
                        return;
                    }
                    if (audioEngine.paused) {
                        audioEngine.play();
                    } else {
                        audioEngine.pause();
                    }
                });

                audioEngine.addEventListener('play', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                });

                audioEngine.addEventListener('pause', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                });

                audioEngine.addEventListener('timeupdate', () => {
                    if (audioEngine.duration) {
                        const calculatedPercentageScore = (audioEngine.currentTime / audioEngine.duration) * 100;
                        progressFill.style.width = `${calculatedPercentageScore}%`;
                    }
                });

                audioEngine.addEventListener('ended', () => {
                    if (focusedIndex < libraryTracksList.length - 1) {
                        reorientFocusTrack(focusedIndex + 1);
                    } else {
                        playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                        progressFill.style.width = '0%';
                    }
                });
            }

            window.addEventListener('resize', refresh3DSpaceTransforms);
        });
    </script>
</body>
</html>
