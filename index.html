<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kitaplığın</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* UI Canvas Standardization Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100vw;
            height: 100vh;
            max-width: 480px;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* Top Header Area Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px 16px 12px 16px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #282828;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.4px;
        }

        .add-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        /* Main Workspace Panels Scroll Track */
        .content {
            padding: 8px 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
            overflow-y: auto;
        }

        /* Trigger Block: Local File Import Panel */
        .import-card {
            width: 100%;
            background-color: #1e1e1e;
            border: none;
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ffffff;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .import-card:active {
            background-color: #242424;
        }

        .import-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        /* Matches the clear down-arrow icon requested */
        .import-icon {
            font-size: 20px;
            color: #ffffff;
            opacity: 0.9;
        }

        .import-text {
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
            text-align: left;
            color: #ffffff;
            max-width: 250px;
        }

        .arrow-icon {
            color: #ffffff;
            opacity: 0.9;
            font-size: 14px;
        }

        /* Guide Helper Onboarding Box */
        .tips-card {
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .tips-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 12px;
        }

        .tips-label {
            font-size: 11px;
            font-weight: 600;
            color: #a7a7a7;
        }

        .close-btn {
            background: none;
            border: none;
            color: #b3b3b3;
            font-size: 16px;
            cursor: pointer;
        }

        .tips-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.1px;
        }

        .tips-subtitle {
            font-size: 13px;
            color: #b3b3b3;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .action-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.96);
        }

        /* Fixed Placement Control Tray Deck */
        .bottom-section {
            position: absolute;
            bottom: 0;
            width: 100%;
            background-color: #121212;
            padding-bottom: 24px;
            display: flex;
            flex-direction: column;
        }

        /* Custom Burgundy Mini Player Deck */
        .mini-player {
            background-color: #51071e; 
            margin: 0 8px 16px 8px;
            border-radius: 8px;
            padding: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .player-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .album-art {
            width: 38px;
            height: 38px;
            border-radius: 4px;
            overflow: hidden;
            flex-shrink: 0;
            background-color: #282828;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-art i {
            color: #b3b3b3;
            font-size: 16px;
        }

        .song-info {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .song-title {
            font-size: 13px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 12px;
            color: #b3b3b3;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .local-badge {
            color: #1db954;
            font-size: 11px;
            display: flex;
            align-items: center;
        }

        .player-right {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-right: 8px;
        }

        .device-btn, .play-btn {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            font-size: 16px;
            width: 20px;
        }

        /* Mini Media Audio Timeline Track Components */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 8px;
            right: 8px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.12);
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: #ffffff;
            transition: width 0.1s linear;
        }

        /* Bottom Tab Selector Grid */
        .bottom-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .nav-item {
            background: none;
            border: none;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .nav-icon {
            font-size: 20px;
            color: #ffffff;
        }

        .nav-item span {
            font-size: 10px;
            font-weight: 500;
            color: #ffffff;
        }

        /* Hidden standard file tag selector input frame */
        #hiddenFileInput {
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <audio id="audioEngine"></audio>
        <input type="file" id="hiddenFileInput" accept="audio/mp3, audio/*">

        <header class="header">
            <div class="header-left">
                <div class="profile-avatar">
                    <img src="https://images.unsplash.com/photo-1570295999919-56ceb5ecca61?q=80&w=100&auto=format&fit=crop" alt="Profile">
                </div>
                <h1>Kitaplığın</h1>
            </div>
            <button class="add-btn"><i class="fa-solid fa-plus"></i></button>
        </header>

        <main class="content">
            <button class="import-card" id="importBtn">
                <div class="import-left">
                    <i class="fa-solid fa-arrow-down import-icon"></i>
                    <span class="import-text">Diğer uygulamalardaki müziklerini içe aktar</span>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </button>

            <div class="tips-card" id="tipsCard">
                <div class="tips-header">
                    <span class="tips-label">İpuçları</span>
                    <button class="close-btn" id="closeTips"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <h2 class="tips-title">İlk çalma listeni oluştur</h2>
                <p class="tips-subtitle">Çok kolay. Sana yardımcı olacağız</p>
                <button class="action-btn">Çalma listesi oluştur</button>
            </div>
        </main>

        <div class="bottom-section">
            <div class="mini-player">
                <div class="player-left">
                    <div class="album-art" id="playerAlbumArtContainer">
                        <i class="fa-solid fa-music" id="fallbackMusicIcon"></i>
                        <img id="playerAlbumArt" src="" alt="Album Cover" style="display: none;">
                    </div>
                    <div class="song-info">
                        <div class="song-title" id="playerTitle">Carita de Angel</div>
                        <div class="song-artist">
                            <span class="local-badge"><i class="fa-solid fa-square-arrow-up-right"></i></span>
                            <span id="playerArtist">Maria Daniela Y Su Sonido Lasser</span>
                        </div>
                    </div>
                </div>
                <div class="player-right">
                    <button class="device-btn"><i class="fa-solid fa-mobile-screen-button"></i></button>
                    <button class="play-btn" id="playBtn"><i class="fa-solid fa-play"></i></button>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <button class="nav-item">
                    <i class="fa-solid fa-lines-leaning nav-icon"></i>
                    <span>Kitaplığın</span>
                </button>
            </nav>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Document selector DOM hooks references
            const closeTips = document.getElementById('closeTips');
            const tipsCard = document.getElementById('tipsCard');
            const playBtn = document.getElementById('playBtn');
            const importBtn = document.getElementById('importBtn');
            const fileInput = document.getElementById('hiddenFileInput');
            const audioEngine = document.getElementById('audioEngine');
            
            // Player presentation DOM targets
            const playerTitle = document.getElementById('playerTitle');
            const playerArtist = document.getElementById('playerArtist');
            const progressFill = document.getElementById('progressFill');
            const playerAlbumArt = document.getElementById('playerAlbumArt');
            const fallbackMusicIcon = document.getElementById('fallbackMusicIcon');

            // Responsive Interface Event Handlers
            if (closeTips && tipsCard) {
                closeTips.addEventListener('click', (e) => {
                    e.stopPropagation();
                    tipsCard.style.display = 'none';
                });
            }

            // Interactive Audio Engine Component State Handler Function Loop
            if (playBtn && audioEngine) {
                playBtn.addEventListener('click', () => {
                    if (!audioEngine.src) {
                        // Triggers the selection menu loop automatically if empty
                        fileInput.click();
                        return;
                    }
                    
                    if (audioEngine.paused) {
                        audioEngine.play();
                    } else {
                        audioEngine.pause();
                    }
                });

                // Mirrors audio status signals directly onto interface controls layout vectors
                audioEngine.addEventListener('play', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
                });

                audioEngine.addEventListener('pause', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                });

                // Updates timeline progress position track smoothly automatically
                audioEngine.addEventListener('timeupdate', () => {
                    if (audioEngine.duration) {
                        const score = (audioEngine.currentTime / audioEngine.duration) * 100;
                        progressFill.style.width = `${score}%`;
                    }
                });

                // Reset layout states when tracking operations reach completion lifecycle points
                audioEngine.addEventListener('ended', () => {
                    playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
                    progressFill.style.width = '0%';
                });
            }

            // Triggers custom file selector actions upon clicking the marked import card block
            if (importBtn && fileInput) {
                importBtn.addEventListener('click', () => {
                    fileInput.click();
                });
            }

            // Handles streaming internal binary target structures safely from local files
            if (fileInput && audioEngine) {
                fileInput.addEventListener('change', (event) => {
                    const pickedFile = event.target.files[0];
                    if (!pickedFile) return;

                    // Parse readable clean display titles automatically from clean file names
                    let baseName = pickedFile.name.replace(/\.[^/.]+$/, ""); // Strip out file extension tokens
                    
                    // Separate artist information fields safely if delimited with typical characters
                    if (baseName.includes(" - ")) {
                        const fragments = baseName.split(" - ");
                        playerArtist.textContent = fragments[0].trim();
                        playerTitle.textContent = fragments[1].trim();
                    } else {
                        playerTitle.textContent = baseName;
                        playerArtist.textContent = "Yerel Dosya (Local Audio)";
                    }

                    // Convert binary resource pointers safely into browser-playable virtual layout URLs
                    const streamURL = URL.createObjectURL(pickedFile);
                    audioEngine.src = streamURL;
                    
                    // Show a modern custom placeholder music asset design style 
                    if (playerAlbumArt && fallbackMusicIcon) {
                        fallbackMusicIcon.style.display = 'block';
                        playerAlbumArt.style.display = 'none';
                    }

                    // Fire up processing run loop actions immediately
                    audioEngine.play().catch(error => {
                        console.log("Playback initiation sequence failed or deferred by runtime: ", error);
                    });
                });
            }
        });
    </script>
</body>
</html>
